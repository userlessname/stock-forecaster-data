name: Daily Market Scanner & AI Forecaster

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force execution (skip market open checks)'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Print Runner System Specifications
        run: |
          echo "========================================================"
          echo "              RUNNER SYSTEM SPECIFICATIONS"
          echo "========================================================"
          echo "OS Details:"
          uname -a
          cat /etc/os-release | grep -E '^PRETTY_NAME=|^VERSION=' || true
          echo "--------------------------------------------------------"
          echo "CPU Details:"
          lscpu | grep -E 'Model name:|CPU\(s\):|Thread\(s\) per core:|Core\(s\) per socket:' || true
          echo "--------------------------------------------------------"
          echo "RAM Details:"
          free -h
          echo "--------------------------------------------------------"
          echo "Disk Details:"
          df -h | grep -E '^Filesystem|/$' || true
          echo "========================================================"

      - name: Detect System CPU Cores
        run: |
          CORES=$(nproc 2>/dev/null | tr -d '[:space:]' || echo 2)
          case "$CORES" in
            *[!0-9]*) CORES=2 ;;
            "") CORES=2 ;;
            *) ;;
          esac
          echo "DETECTED_CORES=$CORES" >> $GITHUB_ENV
          echo "System has $CORES CPU cores. Configuring thread limits accordingly."

      - name: Checkout Public Data Repo (for backend_files.txt)
        uses: actions/checkout@v4
        
      - name: Fetch Private Backend via Raw CDN (Ultimate Parallel Bypass)
        run: |
          python -c "
          import os, urllib.request, concurrent.futures
          
          token = '${{ secrets.PRIVATE_REPO_PAT }}'
          headers = {'Authorization': f'token {token}', 'User-Agent': 'Python'}
          
          print('Downloading backend_files.txt...')
          req = urllib.request.Request('https://raw.githubusercontent.com/userlessname/stock-forecaster-app/main/backend/backend_files.txt', headers=headers)
          with urllib.request.urlopen(req) as r:
              files = r.read().decode().splitlines()
          
          def download_file(filepath):
              if not filepath.strip(): return
              url = f'https://raw.githubusercontent.com/userlessname/stock-forecaster-app/main/{filepath}'
              os.makedirs(os.path.dirname(filepath) or '.', exist_ok=True)
              try:
                  req_file = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req_file) as src, open(filepath, 'wb') as dest:
                      dest.write(src.read())
              except Exception as e:
                  print(f'Failed to download {filepath}: {e}')
                  
          try:
              cores = int(os.environ.get('DETECTED_CORES', '2'))
          except Exception:
              cores = 2
          workers = min(cores * 10, 40)
          print(f'Downloading {len(files)} files in parallel using {workers} workers...')
          with concurrent.futures.ThreadPoolExecutor(max_workers=workers) as executor:
              executor.map(download_file, files)
          print('Successfully fetched all backend files!')
          "

      - name: Set up uv & Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: false
          cache-dependency-glob: "**/uv.lock"

      - name: Check US Market Status
        id: check
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run }}
        run: |
          python backend/check_market.py --force "${FORCE_RUN:-false}" --strict

      - name: Restore Python Virtual Environment
        if: steps.check.outputs.should_run == 'true'
        id: restore-venv
        uses: actions/cache/restore@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-venv-${{ hashFiles('backend/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-venv-

      - name: Restore TA-Lib C Library
        if: steps.check.outputs.should_run == 'true'
        id: restore-ta-lib
        uses: actions/cache/restore@v4
        with:
          path: ~/ta-lib-install
          key: ${{ runner.os }}-ta-lib-v2

      - name: Install TA-Lib
        if: steps.check.outputs.should_run == 'true' && steps.restore-ta-lib.outputs.cache-hit != 'true'
        run: |
          wget http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib/
          ./configure --prefix=$HOME/ta-lib-install  # Local user prefix, no root required
          make
          make install  # Installs locally, no sudo required
          cd ..
          rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

      - name: Save TA-Lib C Library Cache
        if: steps.check.outputs.should_run == 'true' && steps.restore-ta-lib.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/ta-lib-install
          key: ${{ runner.os }}-ta-lib-v2

      - name: Sync Python Dependencies
        if: steps.check.outputs.should_run == 'true'
        run: |
          unset VIRTUAL_ENV
          export TA_INCLUDE_PATH="$HOME/ta-lib-install/include"
          export TA_LIBRARY_PATH="$HOME/ta-lib-install/lib"
          export LD_LIBRARY_PATH="$HOME/ta-lib-install/lib"
          uv sync --project backend

      - name: Save Python Virtual Environment Cache
        if: steps.check.outputs.should_run == 'true' && steps.restore-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: backend/.venv
          key: ${{ runner.os }}-venv-${{ hashFiles('backend/uv.lock') }}

      - name: Restore Hugging Face Models
        if: steps.check.outputs.should_run == 'true'
        id: restore-hf-models
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-v2
          restore-keys: |
            ${{ runner.os }}-hf-models-

      - name: Pre-download Hugging Face Models
        if: steps.check.outputs.should_run == 'true'
        run: |
          unset VIRTUAL_ENV
          export TA_INCLUDE_PATH="$HOME/ta-lib-install/include"
          export TA_LIBRARY_PATH="$HOME/ta-lib-install/lib"
          export LD_LIBRARY_PATH="$HOME/ta-lib-install/lib"
          uv run --project backend python -c "
          import timesfm
          timesfm.TimesFM_2p5_200M_torch.from_pretrained('google/timesfm-2.5-200m-pytorch')
          from transformers import AutoTokenizer, AutoModelForSequenceClassification
          AutoTokenizer.from_pretrained('ProsusAI/finbert')
          AutoModelForSequenceClassification.from_pretrained('ProsusAI/finbert')
          "

      - name: Save Hugging Face Models Cache
        if: steps.check.outputs.should_run == 'true' && steps.restore-hf-models.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-v2

      - name: Run Market Scan & Export to JSON
        if: steps.check.outputs.should_run == 'true'
        env:
          HF_HUB_DISABLE_SYMLINKS_WARNING: '1'
          HF_HUB_ENABLE_HF_TRANSFER: '1'  # Activates the Rust hf-transfer parallel downloader
          HF_HUB_OFFLINE: '1'             # Isolates scan execution from HuggingFace outages/network queries
          PYTHONUNBUFFERED: '1'
          # Dynamic thread pool allocation based on detected CPU cores
          OMP_NUM_THREADS: ${{ env.DETECTED_CORES }}
          MKL_NUM_THREADS: ${{ env.DETECTED_CORES }}
          OPENBLAS_NUM_THREADS: ${{ env.DETECTED_CORES }}
        run: |
          unset VIRTUAL_ENV
          # Dynamically export path variables to prevent hardcoding /home/runner
          export TA_INCLUDE_PATH="$HOME/ta-lib-install/include"
          export TA_LIBRARY_PATH="$HOME/ta-lib-install/lib"
          export LD_LIBRARY_PATH="$HOME/ta-lib-install/lib"
          
          # uv run automatically handles venv creation, dependency compilation, and execution using uv.lock
          uv run --project backend python backend/run_scanner.py --export-json --mode ${{ steps.check.outputs.scan_mode }}

      - name: Fetch Latest Files from gh-pages
        if: steps.check.outputs.should_run == 'true'
        run: |
          git fetch origin gh-pages:gh-pages --depth=1 --force || echo "gh-pages branch not found or empty"
          mkdir -p backend/api
          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            git show gh-pages:metadata.json > backend/temp_metadata.json || echo "No existing metadata.json on gh-pages"
            git show gh-pages:live_prices.json > backend/api/live_prices.json || echo "[]" > backend/api/live_prices.json
          else
            echo "[WARNING] gh-pages reference not found. Creating default empty states."
            echo "[]" > backend/api/live_prices.json
          fi

      - name: Merge Metadata Timestamps
        if: steps.check.outputs.should_run == 'true'
        run: |
          python << 'EOF'
          import os, json
          fetched_path = 'backend/temp_metadata.json'
          generated_path = 'backend/api/metadata.json'
          try:
              # os.path.getsize(fetched_path) > 0 check avoids parsing empty 0-byte cold start metadata files
              if os.path.exists(fetched_path) and os.path.getsize(fetched_path) > 0 and os.path.exists(generated_path):
                  with open(fetched_path, 'r', encoding='utf-8') as f:
                      fetched = json.load(f)
                  with open(generated_path, 'r', encoding='utf-8') as f:
                      generated = json.load(f)
                  
                  # 1. Inject price update timestamp fields from fetched CDN metadata
                  generated['last_price_update_timestamp'] = fetched.get('last_price_update_timestamp', 0)
                  generated['last_price_update_ny_time'] = fetched.get('last_price_update_ny_time', '')
                  
                  # 2. Preserve manual admin controls & database hash verification fields
                  if 'min_supported_version' in fetched:
                      generated['min_supported_version'] = fetched['min_supported_version']
                  if 'force_update_url' in fetched:
                      generated['force_update_url'] = fetched['force_update_url']
                  if 'database_sha256' in fetched:
                      generated['database_sha256'] = fetched['database_sha256']
                  
                  # 3. Compact write utilizing separators to match write_json_atomically standard and optimize bandwidth
                  with open(generated_path, 'w', encoding='utf-8') as f:
                      json.dump(generated, f, separators=(',', ':'))
                  print('[SUCCESS] Merged scan and pricing metadata.')
              else:
                  print('[WARNING] Missing or empty metadata files for merge. Using generated metadata.')
          except Exception as e:
              print(f'[ERROR] Failed to merge metadata ({e}). Using generated metadata.')
          EOF

      - name: Deploy to GitHub Pages
        if: steps.check.outputs.should_run == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PRIVATE_REPO_PAT }}
          external_repository: userlessname/stock-forecaster-data
          publish_dir: ./backend/api
          publish_branch: gh-pages
          force_orphan: true
          keep_files: false
