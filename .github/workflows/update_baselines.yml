name: Update SEC Baselines

on:
  schedule:
    - cron: '17 4 2 * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force execution (skip check validations)'
        required: false
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-baselines:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Print Runner System Specifications
        run: |
          echo "========================================================"
          echo "              RUNNER SYSTEM SPECIFICATIONS"
          echo "========================================================"
          echo "OS Details:"
          uname -a
          cat /etc/os-release | grep -E '^PRETTY_NAME=|^VERSION=' || true
          echo "--------------------------------------------------------"
          echo "CPU Details:"
          lscpu | grep -E 'Model name:|CPU\(s\):|Thread\(s\) per core:|Core\(s\) per socket:' || true
          echo "--------------------------------------------------------"
          echo "RAM Details:"
          free -h
          echo "--------------------------------------------------------"
          echo "Disk Details:"
          df -h | grep -E '^Filesystem|/$' || true
          echo "========================================================"

      - name: Checkout Private Backend
        uses: actions/checkout@v4
        with:
          repository: userlessname/stock-forecaster-app
          token: ${{ secrets.PRIVATE_REPO_PAT }}
          fetch-depth: 1

      - name: Set up uv & Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: false

      - name: Cache uv dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Run Baseline Generator
        run: |
          uv run --project backend python backend/research/generate_sec_baselines.py

      - name: Commit and Push Baselines Database
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update SEC baselines [skip ci]"
          file_pattern: "backend/data/sec_baselines.json"
          branch: main
